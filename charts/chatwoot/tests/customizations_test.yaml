suite: test local customizations
templates:
  - web.yaml
  - worker.yaml
  - policy.yaml
  - base.yaml
release:
  name: chatwoot-release
  namespace: default
tests:
  - it: should have fullnameOverride applied
    set:
      fullnameOverride: "chatwoot"
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot-web

  - it: should scale via profile
    set:
      global: { mode: production }
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should have worker replicas in production
    set:
      global: { mode: production }
    template: worker.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should have hpa enabled for both web and worker when configured
    set:
      networkPolicy: { enabled: true }
      podDisruptionBudget: { enabled: false }
      web: { hpa: { enabled: true, minpods: 1, maxpods: 5, cputhreshold: 80 } }
      worker: { hpa: { enabled: true, minpods: 2, maxpods: 5, cputhreshold: 70 } }
    template: policy.yaml
    asserts:
      - equal:
          path: spec.minReplicas
          value: 1
        documentIndex: 1 # HPA for web (Doc 0 is NetworkPolicy)
      - equal:
          path: spec.minReplicas
          value: 2
        documentIndex: 2 # HPA for worker
