suite: test local customizations
templates:
  - app.yaml
  - policy.yaml
release:
  name: chatwoot-release
  namespace: default
tests:
  - it: should have fullnameOverride applied
    set:
      fullnameOverride: "chatwoot"
    template: app.yaml
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot-web
        documentIndex: 1 # Web Deployment is the 2nd doc in app.yaml

  - it: should scale via profile
    set:
      global: { mode: production }
    template: app.yaml
    asserts:
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 1 # Web
      - equal:
          path: spec.replicas
          value: 2
        documentIndex: 2 # Worker

  - it: should have hpa enabled for both web and worker when configured
    set:
      web: { hpa: { enabled: true, minpods: 1, cputhreshold: 80 } }
      worker: { hpa: { enabled: true, minpods: 2, cputhreshold: 70 } }
    template: policy.yaml
    asserts:
      - equal:
          path: spec.minReplicas
          value: 1
        documentIndex: 2 # 3rd doc in policy.yaml (PDBs come first, then HPA)
      - equal:
          path: spec.minReplicas
          value: 2
        documentIndex: 3
