suite: test local customizations
templates:
  - web.yaml
  - worker.yaml
  - policy.yaml
  - base.yaml
release:
  name: chatwoot-release
  namespace: default
tests:
  - it: should have fullnameOverride applied
    set:
      fullnameOverride: "chatwoot"
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot-web

  - it: should preserve immutable selector labels for safe Rancher upgrades
    set:
      fullnameOverride: "chatwoot"
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: chatwoot
            app.kubernetes.io/instance: chatwoot-release
            role: web
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0

  - it: should preserve worker immutable selector labels for safe Rancher upgrades
    set:
      fullnameOverride: "chatwoot"
    template: worker.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.selector.matchLabels
          value:
            app.kubernetes.io/name: chatwoot
            app.kubernetes.io/instance: chatwoot-release
            role: worker
      - equal:
          path: spec.strategy.rollingUpdate.maxUnavailable
          value: 0

  - it: should allow pod annotations and scheduling hints without replacing hard affinity
    set:
      podAnnotations:
        rollout-note: "rancher-safe"
      nodeSelector:
        dedicated: chatwoot
      tolerations:
        - key: dedicated
          operator: Equal
          value: chatwoot
          effect: NoSchedule
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.metadata.annotations.rollout-note
          value: rancher-safe
      - equal:
          path: spec.template.spec.nodeSelector.dedicated
          value: chatwoot
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: dedicated
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: worker

  - it: should reference a custom service account name from pods
    set:
      serviceAccount:
        create: true
        name: chatwoot-runner
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: chatwoot-runner

  - it: should scale via profile
    set:
      global: { mode: production }
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should deploy the Chatwoot v4.13.0 image on web
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: chatwoot/chatwoot:v4.13.0

  - it: should deploy the Chatwoot v4.13.0 image on worker
    template: worker.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: chatwoot/chatwoot:v4.13.0

  - it: should have worker replicas in production
    set:
      global: { mode: production }
    template: worker.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.replicas
          value: 2

  - it: should have hpa enabled for both web and worker when configured
    set:
      networkPolicy: { enabled: true }
      podDisruptionBudget: { enabled: false }
      web: { hpa: { enabled: true, minpods: 1, maxpods: 5, cputhreshold: 80 } }
      worker: { hpa: { enabled: true, minpods: 2, maxpods: 5, cputhreshold: 70 } }
    template: policy.yaml
    asserts:
      - equal:
          path: spec.minReplicas
          value: 1
        documentIndex: 1 # HPA for web (Doc 0 is NetworkPolicy)
      - equal:
          path: spec.minReplicas
          value: 2
        documentIndex: 2 # HPA for worker
