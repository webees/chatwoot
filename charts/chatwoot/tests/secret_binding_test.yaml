suite: test secret binding and upgrade safety
templates:
  - deployment.web.yaml
tests:
  - it: should bind to external postgres secret if existingSecret is provided
    set:
      postgresql:
        auth:
          existingSecret: "ext-pg-secret"
          secretKeys:
            adminPasswordKey: "pg-pass"
    template: deployment.web.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ext-pg-secret
                key: pg-pass
          any: true

  - it: should bind to external redis secret if existingSecret is provided
    set:
      redis:
        auth:
          existingSecret: "ext-redis-secret"
          existingSecretPasswordKey: "redis-pass"
    template: deployment.web.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: ext-redis-secret
                key: redis-pass
          any: true
