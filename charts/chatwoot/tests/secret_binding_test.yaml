suite: test secret binding and upgrade safety
templates:
  - web.yaml
  - base.yaml
tests:
  - it: should bind to external postgres secret if existingSecret is provided
    template: web.yaml
    set:
      postgresql:
        auth:
          existingSecret: "custom-pg-secret"
          secretKeys:
            adminPasswordKey: "custom-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: POSTGRES_PASSWORD
            valueFrom:
              secretKeyRef:
                name: custom-pg-secret
                key: custom-key

  - it: should bind to external redis secret if existingSecret is provided
    template: web.yaml
    set:
      redis:
        auth:
          existingSecret: "custom-redis-secret"
          existingSecretPasswordKey: "custom-key"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: custom-redis-secret
                key: custom-key
