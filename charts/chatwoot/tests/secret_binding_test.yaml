suite: test secret volumes and binding persistence
templates:
  - web-deployment.yaml
  - env-secret.yaml
tests:
  - it: should correctly bind env secret even after fullnameOverride change
    set:
      fullnameOverride: "new-chatwoot-name"
    template: web-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].envFrom[0].secretRef.name
          value: "new-chatwoot-name-env"

  - it: should correctly pull postgres password from existingSecret if configured
    set:
      postgresql:
        auth:
          existingSecret: "my-pre-existing-db-secret"
          secretKeys:
            adminPasswordKey: "db-pass"
    template: web-deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: "POSTGRES_PASSWORD"
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: "my-pre-existing-db-secret"
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: "db-pass"

  - it: should have persistent disk volume for postgres by default
    template: values.yaml # This is a config check
    set:
      postgresql:
        primary:
          persistence:
            enabled: true
    asserts:
      - isTrue:
          path: postgresql.primary.persistence.enabled
