suite: test redis standalone configuration
templates:
  - values.yaml
  - _helpers.tpl
tests:
  - it: should verify redis secret path for bitnami chart
    template: web-deployment.yaml
    set:
      redis:
        auth:
          existingSecret: "custom-redis-secret"
          existingSecretPasswordKey: "custom-key"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: "custom-redis-secret"
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: "custom-key"

