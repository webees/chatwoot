suite: test cache (redis) configuration
templates:
  - web.yaml
  - base.yaml
tests:
  - it: should use memory storage for cache by default
    template: web.yaml
    documentIndex: 0
    set:
      redis:
        master:
          persistence:
            medium: Memory
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].emptyDir.medium
          value: Memory

  - it: should load environment from secret
    template: web.yaml
    documentIndex: 0
    release:
      name: cw
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: cw-chatwoot-env
