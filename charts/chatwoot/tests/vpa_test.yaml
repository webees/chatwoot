suite: test autonomous resource optimization (VPA)
templates:
  - policy.yaml
tests:
  - it: should not render VPA by default
    set:
      vpa: { enabled: false }
    asserts:
      - hasDocuments:
          count: 0 # Assuming No other policies are enabled in default test values
        # We need to be careful with other enabled policies. 
        # Better to check specifically for the kind.

  - it: should render VPA for both web and worker when enabled
    set:
      vpa: { enabled: true }
      networkPolicy: { enabled: false }
      podDisruptionBudget: { enabled: false }
    asserts:
      - equal:
          path: kind
          value: VerticalPodAutoscaler
        documentIndex: 0
      - equal:
          path: metadata.name
          value: chatwoot-web
        documentIndex: 0
      - equal:
          path: metadata.name
          value: chatwoot-worker
        documentIndex: 1
      - equal:
          path: spec.resourcePolicy.containerPolicies[0].minAllowed.memory
          value: 128Mi
        documentIndex: 0
