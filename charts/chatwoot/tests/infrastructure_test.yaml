suite: test infrastructure stability
templates:
  - job.migrate.yaml
  - secret.env.yaml
  - ingress.yaml
tests:
  - it: should use pg16 for multi-arch (ARM) support
    set:
      postgresql:
        image:
          tag: pg16
    template: job.migrate.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[0].args[0]
          value: -c
      - matchRegex:
          path: spec.template.spec.initContainers[0].args[1]
          pattern: "pg_isready -h chatwoot-release-chatwoot-postgresql -p 5432"

  - it: should render environment secret correctly
    template: secret.env.yaml
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot-release-chatwoot-env
      - exists:
          path: data.POSTGRES_HOST
      - exists:
          path: data.REDIS_URL

  - it: should link ingress to the correct service name
    set:
      fullnameOverride: "chatwoot"
      ingress:
        enabled: true
        hosts:
          - host: chatwoot.example.com
            paths:
              - path: /
                pathType: Prefix
    template: ingress.yaml
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: chatwoot
