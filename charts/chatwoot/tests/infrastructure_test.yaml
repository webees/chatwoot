suite: test infrastructure stability
templates:
  - job.migrate.yaml
  - base.yaml
  - ingress.yaml
  - web.yaml
release:
  name: chatwoot-release
  namespace: default
tests:
  - it: should use pg16 for multi-arch (ARM) support
    set:
      postgresql:
        enabled: true
        postgresqlHost: ""
        image:
          tag: pg16
    template: job.migrate.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].args[1]
          # Match the expanded script but keep it flexible
          pattern: "pg_isready -h \"chatwoot-postgresql\" -p \"5432\" -U \"chatwoot\" -d \"chatwoot\" -t 5"

  - it: should pass configured postgres identity to migrate readiness checks
    set:
      postgresql:
        enabled: false
        postgresqlHost: "pg-pooler-rw.cnpg.svc.cluster.local"
        postgresqlPort: "5432"
        auth:
          username: chatwoot
          database: chatwoot
    template: job.migrate.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.initContainers[0].args[1]
          pattern: "pg_isready -h \"pg-pooler-rw.cnpg.svc.cluster.local\" -p \"5432\" -U \"chatwoot\" -d \"chatwoot\" -t 5"

  - it: should render environment secret correctly
    template: base.yaml
    set:
      fullnameOverride: "chatwoot"
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot-env
        documentIndex: 0 # Secret is at index 0

  - it: should preserve service account name for Rancher upgrades
    template: base.yaml
    set:
      fullnameOverride: "chatwoot"
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot
        documentIndex: 1 # ServiceAccount is at index 1

  - it: should render service account annotations when provided
    template: base.yaml
    set:
      fullnameOverride: "chatwoot"
      serviceAccount:
        create: true
        annotations:
          iam.gke.io/gcp-service-account: chatwoot@example.iam.gserviceaccount.com
    asserts:
      - equal:
          path: metadata.annotations["iam.gke.io/gcp-service-account"]
          value: chatwoot@example.iam.gserviceaccount.com
        documentIndex: 1

  - it: should create the custom service account name referenced by pods
    template: base.yaml
    set:
      serviceAccount:
        create: true
        name: chatwoot-runner
    asserts:
      - equal:
          path: metadata.name
          value: chatwoot-runner
        documentIndex: 1

  - it: should link ingress to the correct service name
    set:
      fullnameOverride: "chatwoot"
      ingress:
        enabled: true
        hosts:
          - host: chatwoot.example.com
            paths:
              - path: /
                pathType: Prefix
    template: ingress.yaml
    asserts:
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: chatwoot

  - it: should use lightweight readiness checks by default
    template: web.yaml
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health

  - it: should default all pods to worker nodes (Hard Constraint)
    template: job.migrate.yaml
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: "worker"

  - it: should use the Chatwoot image and TCP checks for cache readiness
    template: job.migrate.yaml
    asserts:
      - equal:
          path: spec.template.spec.initContainers[1].image
          value: chatwoot/chatwoot:v4.13.0
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[1]
          pattern: "TCPSocket.new\\(ARGV\\[0\\], Integer\\(ARGV\\[1\\]\\)\\).*\"valkey-rw.valkey.svc.cluster.local\" \"6379\" \"5\""

  - it: should allow probe timings to be customized without changing paths
    template: web.yaml
    set:
      web:
        readinessProbe:
          initialDelaySeconds: 21
          periodSeconds: 7
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 4
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.periodSeconds
          value: 7

  - it: should allow api readiness checks when explicitly requested
    template: web.yaml
    set:
      web:
        readinessProbe:
          path: /api
    documentIndex: 0
    asserts:
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /api

  - it: should apply migrate hook resources from hooks values
    template: job.migrate.yaml
    set:
      hooks:
        migrate:
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 512Mi
      - equal:
          path: spec.template.spec.containers[0].resources.requests.memory
          value: 256Mi

  - it: should allow migrate hook waiting and lifecycle knobs to be tuned
    template: job.migrate.yaml
    set:
      hooks:
        migrate:
          backoffLimit: 2
          activeDeadlineSeconds: 900
          ttlSecondsAfterFinished: 120
          wait:
            timeoutSeconds: 9
            intervalSeconds: 4
          podAnnotations:
            sidecar.istio.io/inject: "false"
    asserts:
      - equal:
          path: spec.backoffLimit
          value: 2
      - equal:
          path: spec.activeDeadlineSeconds
          value: 900
      - equal:
          path: spec.ttlSecondsAfterFinished
          value: 120
      - equal:
          path: spec.template.metadata.annotations["sidecar.istio.io/inject"]
          value: "false"
      - matchRegex:
          path: spec.template.spec.initContainers[0].args[1]
          pattern: "-t 9"
      - matchRegex:
          path: spec.template.spec.initContainers[0].args[1]
          pattern: "sleep 4"
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[1]
          pattern: "\"valkey-rw.valkey.svc.cluster.local\" \"6379\" \"9\""
      - matchRegex:
          path: spec.template.spec.initContainers[1].args[1]
          pattern: "sleep 4"
