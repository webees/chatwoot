# 🧶 Chatwoot: 极客进化版 (Geek v3.0)
# 核心哲学：极简、原子、自愈

# --- [ 0. 全局 Profile ] ---
# production: 高可用、双副本、强隔离
# lite: 单 Pod 运行、低内存、开发模式
global:
  mode: production
  affinity: {} # 全局 Pod 亲和性，留空则使用默认调度

# --- [ 1. 核心镜像 ] ---
image: { repository: chatwoot/chatwoot, tag: v4.11.1, pullPolicy: IfNotPresent }

# --- [ 2. 安全与策略控制 ] ---
networkPolicy: { enabled: true, allowExternalEgress: true }
podDisruptionBudget: { enabled: false, minAvailable: 1 }

# --- [ 3. 组件精控 (留空则使用模式默认值) ] ---
web:
  # replicaCount: 1 # 手动覆盖模式默认副本数
  resources: { limits: { cpu: 500m, memory: 512Mi }, requests: { cpu: 100m, memory: 256Mi } }
  hpa: { enabled: false, minpods: 1, maxpods: 10, cputhreshold: 75 }

worker:
  resources: { limits: { cpu: 500m, memory: 512Mi }, requests: { cpu: 100m, memory: 256Mi } }
  hpa: { enabled: false, minpods: 1, maxpods: 10, cputhreshold: 75 }

# --- [ 4. 基础设施 (推荐使用 Operator，当前保留 Subchart 以兼容) ] ---
postgresql:
  enabled: true
  image: { registry: docker.io, repository: pgvector/pgvector, tag: pg16 }
  auth: { username: postgres, postgresPassword: postgres, database: chatwoot_production }
  primary:
    persistence: { enabled: true, size: 1Gi, accessModes: [ReadWriteOnce] }
  resources: { limits: { memory: 512Mi }, requests: { memory: 256Mi } }

redis:
  enabled: true
  architecture: standalone
  auth: { password: redis }
  master:
    persistence: { enabled: false, medium: Memory }
  resources: { limits: { memory: 256Mi }, requests: { memory: 128Mi } }

# --- [ 5. 网络接入 ] ---
service: { type: LoadBalancer, port: 80 }
services: { internalPort: 3000, targetPort: 3000 }
ingress:
  enabled: false
  hosts: [{ host: "", paths: [{ path: /, pathType: Prefix }] }]
  tls: []

# --- [ 6. 元数据与生命周期 ] ---
fullnameOverride: "chatwoot"
serviceAccount: { create: true }
hooks:
  migrate: { hookAnnotation: "post-install,post-upgrade" }

env:
  DEFAULT_LOCALE: zh-CN
  INSTALLATION_ENV: helm
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: true
  SMTP_ADDRESS: smtp.gmail.com
  SMTP_PORT: 587
