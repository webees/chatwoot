# 🧶 Chatwoot: 极客进化版 (Geek v3.3)
# 核心哲学：极简、原子、自愈、智能资源治理

# --- [ 0. 全局模式 ] ---
global:
  mode: production # production | lite

# --- [ 1. 核心镜像 ] ---
image: { repository: chatwoot/chatwoot, tag: v4.11.1, pullPolicy: IfNotPresent }

# --- [ 2. 智能资源治理 (v3.3 New!) ] ---
# 极客进化：VPA 自动学习并调整 Web/Worker 的内存和 CPU 配额
# 建议在集群中安装了 vpa-recommender 后开启
vpa:
  enabled: false
  updateMode: "Auto" # 选项: Auto, Off (仅推荐), Recreate

# --- [ 3. 智能存储引擎 ] ---
storage:
  type: local # local | s3 | gcs
  s3: { bucket: "", region: "", accessKeyId: "", secretAccessKey: "" }
  gcs: { bucket: "", project: "" }

# --- [ 4. 极简负载配置 ] ---
web:
  resources: { limits: { cpu: 500m, memory: 512Mi }, requests: { cpu: 100m, memory: 256Mi } }
  hpa: { enabled: false, minpods: 1, maxpods: 10, cputhreshold: 75 }

worker:
  resources: { limits: { cpu: 500m, memory: 512Mi }, requests: { cpu: 100m, memory: 256Mi } }
  hpa: { enabled: false, minpods: 1, maxpods: 10, cputhreshold: 75 }

# --- [ 5. 安全与流量治理 ] ---
networkPolicy: { enabled: true, allowExternalEgress: true }
podDisruptionBudget: { enabled: false }

# --- [ 6. 基础设施 ] ---
postgresql:
  enabled: true
  fullnameOverride: "chatwoot-postgresql"
  image: { registry: docker.io, repository: pgvector/pgvector, tag: pg16 }
  auth:
    username: postgres
    database: chatwoot_production
    # 原子化命名：升级后将使用 chatwoot-postgresql-password 这个干净的 Secret 名
    existingSecret: "chatwoot-postgresql-auth"
    secretKeys:
      adminPasswordKey: "postgres-password"
      userPasswordKey: "postgres-password"
  primary:
    persistence:
      enabled: true
      size: 1Gi
      accessModes: [ReadWriteOnce]
      # 极客迁移开启：不再指向带 ID 的 PVC，而是指向我们即将创建的干净 PVC
      existingClaim: "chatwoot-postgresql-data"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: worker
                  operator: Exists
                - key: longhorn
                  operator: Exists
  resources: { limits: { memory: 512Mi }, requests: { memory: 256Mi } }

redis:
  enabled: true
  fullnameOverride: "chatwoot-redis"
  architecture: standalone
  image: { registry: docker.io, repository: library/redis, tag: "7.4" }
  auth:
    existingSecret: "chatwoot-redis-auth"
    existingSecretPasswordKey: "redis-password"
  master:
    persistence: { enabled: false, medium: Memory }
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: worker
                  operator: Exists
                - key: longhorn
                  operator: Exists
  replica:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: worker
                  operator: Exists
                - key: longhorn
                  operator: Exists

# --- [ 7. 网络接入 ] ---
service: { type: ClusterIP, port: 3000 }
services: { internalPort: 3000, targetPort: 3000 }
ingress:
  enabled: true
  nameOverride: "chatwoot-ingress"
  hosts:
    - host: "chat.example.com"
      paths:
        - path: /
          pathType: Prefix

# --- [ 8. 元数据与生命周期 ] ---
fullnameOverride: "chatwoot"
serviceAccount: { create: true }
hooks:
  migrate: { hookAnnotation: "post-install,post-upgrade" }

# --- [ 9. 智能迁移工具 ] ---
migration:
  enabled: true # 开启后将自动接管 Release 名称对应的旧磁盘和 Secret
  legacyInstanceName: "" # 如不填，则自动使用 .Release.Name
env:
  DEFAULT_LOCALE: zh-CN
  INSTALLATION_ENV: helm
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: true
  SMTP_ADDRESS: smtp.gmail.com
  SMTP_PORT: 587
  FRONTEND_URL: https://chat.example.com
  # SECRET_KEY_BASE: 通过 values.override.yaml 或 --set 传入，禁止提交到仓库
