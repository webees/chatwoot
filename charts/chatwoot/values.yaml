# 🧶 Chatwoot: Professional Grade Customer Engagement
# Artistic Hardened Edition - v2.1.15

# --- [ Core Settings ] ---
image:
  repository: chatwoot/chatwoot
  tag: v4.11.1
  pullPolicy: IfNotPresent

autoscaling:
  apiVersion: autoscaling/v2

# --- [ High Availability Policy ] ---
podDisruptionBudget:
  enabled: false
  # minAvailable: 1

topologySpreadConstraints: []

# --- [ Component: Web ] ---
web:
  replicaCount: 1
  hpa:
    enabled: false
    minpods: 1
    maxpods: 10
    cputhreshold: 75
    memorythreshold: 75
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# --- [ Component: Worker ] ---
worker:
  replicaCount: 2
  hpa:
    enabled: false
    minpods: 2
    maxpods: 10
    cputhreshold: 75
    memorythreshold: 75
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# --- [ Component: Database (Postgres) ] ---
postgresql:
  enabled: true
  nameOverride: chatwoot-postgresql
  image:
    registry: docker.io
    repository: pgvector/pgvector
    tag: pg16
  auth:
    username: postgres
    postgresPassword: postgres
    database: chatwoot_production
  primary:
    persistence:
      enabled: true
      size: 1Gi
      accessModes: [ReadWriteOnce]
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: worker
                  operator: Exists
  resources:
    limits: { cpu: 500m, memory: 512Mi }
    requests: { cpu: 100m, memory: 256Mi }
  readReplicas: { enabled: false }

# --- [ Component: Cache (Redis) ] ---
redis:
  enabled: true
  nameOverride: chatwoot-redis
  architecture: standalone
  image:
    repository: bitnamilegacy/redis
  auth:
    password: redis
  master:
    persistence:
      enabled: false
      medium: Memory
  resources:
    limits: { cpu: 200m, memory: 256Mi }
    requests: { cpu: 100m, memory: 128Mi }

# --- [ Network & Ingress ] ---
services:
  name: chatwoot
  internalPort: 3000
  targetPort: 3000
  type: LoadBalancer

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  annotations: {}
  hosts:
    - host: ""
      paths: [{ path: /, pathType: Prefix }]
  tls: []

# --- [ Security & Governance ] ---
fullnameOverride: "chatwoot"

serviceAccount:
  create: true
  name: ""
  annotations: {}

podSecurityContext: { fsGroup: 1000 }
securityContext: { runAsNonRoot: true, runAsUser: 1000 }
imagePullSecrets: []
nodeSelector: {}
tolerations: []
affinity: {}

# --- [ Lifecycle Hooks ] ---
hooks:
  migrate:
    hookAnnotation: "post-install,post-upgrade"
    resources:
      limits: { memory: 1000Mi }
      requests: { memory: 1000Mi }

# --- [ Environment & Secrets ] ---
existingEnvSecret: ""
env:
  DEFAULT_LOCALE: zh-CN
  INSTALLATION_ENV: helm
  RAILS_ENV: production
  RAILS_LOG_TO_STDOUT: true
  SMTP_ADDRESS: smtp.gmail.com
  SMTP_AUTHENTICATION: plain
  SMTP_ENABLE_STARTTLS_AUTO: true
  SMTP_OPENSSL_VERIFY_MODE: none
  SMTP_PORT: 587
