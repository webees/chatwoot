apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatwoot.full" . }}-web
  creationTimestamp: null
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
    role: web
spec:
  replicas: {{ int .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "chatwoot.selector" . | nindent 6 }}
      role: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      creationTimestamp: null
      labels:
        {{- include "chatwoot.selector" . | nindent 8 }}
        role: web
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/secret.env.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "chatwoot.pod.common" . | nindent 6 }}
      containers:
        - args:
            - bundle
            - exec
            - rails
            - s
            - -p
            - {{ .Values.services.internalPort | quote}}
            - -b
            - 0.0.0.0
          command:
            - docker/entrypoints/rails.sh
          env:
          {{- include "chatwoot.env.common" . | nindent 10 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          name: web
          ports:
            - containerPort: {{ int .Values.services.internalPort }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ int .Values.services.internalPort }}
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api
              port: {{ int .Values.services.internalPort }}
            initialDelaySeconds: 15
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /health
              port: {{ int .Values.services.internalPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
          volumeMounts:
            - name: cache
              mountPath: /app/tmp
      serviceAccountName: {{ include "chatwoot.serviceAccountName" . }}
      {{- if .Values.securityContext }}
      securityContext: {{ .Values.securityContext | toYaml | nindent 8 }}
      {{- end }}
