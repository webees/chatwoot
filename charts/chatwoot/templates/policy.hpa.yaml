{{- range $component := list "web" "worker" }}
{{- $config := index $.Values $component }}
{{- if $config.hpa.enabled -}}
apiVersion: {{ $.Values.autoscaling.apiVersion }}
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "chatwoot.full" $ }}-{{ $component }}
  labels:
    {{- include "chatwoot.labels" $ | nindent 4 }}
    role: {{ $component }}
spec:
  scaleTargetRef:
    kind: Deployment
    apiVersion: apps/v1
    name: {{ include "chatwoot.full" $ }}-{{ $component }}
  minReplicas: {{ $config.hpa.minpods }}
  maxReplicas: {{ $config.hpa.maxpods }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $config.hpa.cputhreshold }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ default 80 $config.hpa.memorythreshold }}
---
{{- end }}
{{- end }}
