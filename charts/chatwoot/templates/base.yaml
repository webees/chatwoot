{{/* --- [ 基础资源：Secret 与 ServiceAccount ] --- */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatwoot.full" . }}-env
  labels: {{ include "chatwoot.labels" . | nindent 4 }}
type: Opaque
data:
{{ include "chatwoot.env.secretData" . | nindent 2 }}
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chatwoot.serviceAccountName" . }}
  labels: {{ include "chatwoot.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
