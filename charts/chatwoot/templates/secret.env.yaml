apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatwoot.full" . }}-env
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
data:
  POSTGRES_HOST: {{ include "chatwoot.db.host" . | b64enc | quote }}
  POSTGRES_PORT: {{ include "chatwoot.db.port" . | b64enc | quote }}
  POSTGRES_USERNAME: {{ default "postgres" .Values.postgresql.auth.username | b64enc | quote }}
  {{- if not .Values.postgresql.auth.existingSecret }}
  POSTGRES_PASSWORD: {{ default "postgres" .Values.postgresql.auth.postgresPassword | b64enc | quote }}
  {{- end }}
  POSTGRES_DATABASE: {{ default "chatwoot_production" .Values.postgresql.auth.database | b64enc | quote }}
  REDIS_HOST: {{ include "chatwoot.cache.host" . | b64enc | quote }}
  REDIS_PORT: {{ include "chatwoot.cache.port" . | b64enc | quote }}
  {{- if not .Values.redis.existingSecret }}
  REDIS_PASSWORD: {{ include "chatwoot.cache.password" . | b64enc | quote }}
  {{- end }}
  REDIS_URL: {{ include "chatwoot.cache.url" . | b64enc | quote }}
  {{- range $key, $value := .Values.env}}
  {{ $key }}: {{ $value | toString | b64enc | quote }}
  {{- end }}
