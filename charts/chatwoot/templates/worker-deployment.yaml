apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ template "chatwoot.fullname" . }}-worker
  creationTimestamp: null
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
    role: worker
spec:
  replicas: {{ int .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "chatwoot.selectorLabels" . | nindent 6 }}
      role: worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      creationTimestamp: null
      labels:
        {{- include "chatwoot.selectorLabels" . | nindent 8 }}
        role: worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/env-secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "chatwoot.podCommon" . | nindent 6 }}
      containers:
        - args:
            - bundle
            - exec
            - sidekiq
            - -C
            - config/sidekiq.yml
          env:
          {{- include "chatwoot.envCommon" . | nindent 10 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          name: worker
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
            {{- end }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: cache
              mountPath: /app/tmp
      serviceAccountName: {{ include "chatwoot.serviceAccountName" . }}
      {{- if .Values.securityContext }}
      securityContext: {{ .Values.securityContext | toYaml | nindent 8 }}
      {{- end }}

