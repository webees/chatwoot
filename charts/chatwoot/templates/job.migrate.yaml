{{/* --- [ 数据库自动迁移任务 ] --- */}}
{{- $hooks := default dict .Values.hooks -}}
{{- $migrate := default dict $hooks.migrate -}}
{{- $migrateWait := default dict $migrate.wait -}}
{{- $waitTimeoutSeconds := default 5 $migrateWait.timeoutSeconds -}}
{{- $waitIntervalSeconds := default 2 $migrateWait.intervalSeconds -}}
{{- $backoffLimit := 6 -}}
{{- if hasKey $migrate "backoffLimit" -}}
{{- $backoffLimit = $migrate.backoffLimit -}}
{{- end -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "chatwoot.full" . }}-migrate"
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": {{ default "post-install,post-upgrade" $migrate.hookAnnotation | quote }}
    "helm.sh/hook-delete-policy": "hook-succeeded,before-hook-creation"
    "helm.sh/hook-weight": "-1"
spec:
  backoffLimit: {{ $backoffLimit }}
  {{- if hasKey $migrate "activeDeadlineSeconds" }}
  activeDeadlineSeconds: {{ $migrate.activeDeadlineSeconds }}
  {{- end }}
  {{- if hasKey $migrate "ttlSecondsAfterFinished" }}
  ttlSecondsAfterFinished: {{ $migrate.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    {{- with $migrate.podAnnotations }}
    metadata:
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
    spec:
      {{- include "chatwoot.pod.common" (dict "root" . "component" "migrate") | nindent 6 }}
      restartPolicy: Never
      initContainers:
        - name: init-db
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh"]
          args:
            - -c
            - >-
              until pg_isready
              -h {{ include "chatwoot.db.host" . | quote }}
              -p {{ include "chatwoot.db.port" . | quote }}
              -U {{ include "chatwoot.db.username" . | quote }}
              -d {{ include "chatwoot.db.database" . | quote }}
              -t {{ $waitTimeoutSeconds }};
              do
                echo "正在等待数据库 {{ include "chatwoot.db.host" . }}:{{ include "chatwoot.db.port" . }}";
                sleep {{ $waitIntervalSeconds }};
              done;
              echo "数据库已准备就绪，可以接收连接。" ;
        - name: init-cache
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh"]
          args:
            - -c
            - >-
              until ruby -rsocket -rtimeout -e
              'Timeout.timeout(Integer(ARGV[2])) { socket = TCPSocket.new(ARGV[0], Integer(ARGV[1])); socket.close }'
              {{ include "chatwoot.cache.host" . | quote }}
              {{ include "chatwoot.cache.port" . | quote }}
              {{ $waitTimeoutSeconds | quote }};
              do
                echo "正在等待缓存 {{ include "chatwoot.cache.host" . }}:{{ include "chatwoot.cache.port" . }}";
                sleep {{ $waitIntervalSeconds }};
              done;
              echo "缓存已准备就绪，可以接收连接。" ;
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - bundle
            - exec
            - rails
            - db:chatwoot_prepare
          env:
            {{- include "chatwoot.env.common" . | nindent 12 }}
          envFrom:
            {{- include "chatwoot.envFrom.common" . | nindent 12 }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: cache
              mountPath: /app/tmp
          {{- if $migrate.resources }}
          resources:
            {{- toYaml $migrate.resources | nindent 12 }}
          {{- else if .Values.postgresql.resources }}
          resources:
            {{- toYaml .Values.postgresql.resources | nindent 12 }}
          {{- end }}
