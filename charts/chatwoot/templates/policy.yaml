{{/* --- [ 1. 网络策略: 零信任流量治理 ] --- */}}
{{- if .Values.networkPolicy.enabled }}
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: {{ include "chatwoot.full" . }}-{{ .Release.Name }}-boundary
  labels:
    {{- include "chatwoot.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "chatwoot.selector" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "chatwoot.selector" . | nindent 14 }}
    - from: []
      ports:
        - protocol: TCP
          port: {{ .Values.services.internalPort }}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "chatwoot.name" . }}
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.networkPolicy.allowExternalEgress }}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
    {{- end }}
{{- end }}
{{- if .Values.podDisruptionBudget.enabled }}
---
{{/* --- [ 2. Pod 干扰预算 (PDB) ] --- */}}
{{- range $role := list "web" "worker" }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "chatwoot.full" $ }}-{{ $role }}
  labels:
    {{- include "chatwoot.labels" $ | nindent 4 }}
spec:
  minAvailable: {{ default 1 $.Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "chatwoot.selector" $ | nindent 6 }}
      role: {{ $role }}
---
{{- end }}
{{- end }}
{{- range $role := list "web" "worker" }}
{{- $cfg := index $.Values $role }}
{{- if $cfg.hpa.enabled }}
---
{{/* --- [ 3. 水平自动扩缩容 (HPA) ] --- */}}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "chatwoot.full" $ }}-{{ $role }}
  labels:
    {{- include "chatwoot.labels" $ | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "chatwoot.full" $ }}-{{ $role }}
  minReplicas: {{ $cfg.hpa.minpods }}
  maxReplicas: {{ $cfg.hpa.maxpods }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $cfg.hpa.cputhreshold }}
{{- end }}
{{- end }}
{{- if .Values.vpa.enabled }}
{{- range $role := list "web" "worker" }}
---
{{/* --- [ 4. 垂直自动扩缩容 (VPA) ] --- */}}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "chatwoot.full" $ }}-{{ $role }}
  labels:
    {{- include "chatwoot.labels" $ | nindent 4 }}
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "chatwoot.full" $ }}-{{ $role }}
  updatePolicy:
    updateMode: {{ default "Auto" $.Values.vpa.updateMode | quote }}
  resourcePolicy:
    containerPolicies:
      - containerName: {{ $role }}
        minAllowed:
          cpu: 50m
          memory: 128Mi
        maxAllowed:
          cpu: 1
          memory: 2Gi
{{- end }}
{{- end }}
