{{/* --- [ 1. Environment Secrets ] --- */}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chatwoot.full" . }}-env
  labels: {{ include "chatwoot.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_HOST: {{ include "chatwoot.db.host" . | b64enc | quote }}
  POSTGRES_PORT: {{ default "5432" .Values.postgresql.postgresqlPort | toString | b64enc | quote }}
  POSTGRES_USERNAME: {{ default "postgres" .Values.postgresql.auth.username | b64enc | quote }}
  {{- if not .Values.postgresql.auth.existingSecret }}
  POSTGRES_PASSWORD: {{ default "postgres" .Values.postgresql.auth.postgresPassword | b64enc | quote }}
  {{- end }}
  REDIS_HOST: {{ include "chatwoot.cache.host" . | b64enc | quote }}
  REDIS_PORT: {{ default "6379" .Values.redis.port | toString | b64enc | quote }}
  REDIS_URL: {{ (printf "redis://:%s@%s:%s" (default "redis" .Values.redis.auth.password) (include "chatwoot.cache.host" .) (default "6379" .Values.redis.port | toString)) | b64enc | quote }}
  {{- range $k, $v := .Values.env }}
  {{ $k }}: {{ $v | toString | b64enc | quote }}
  {{- end }}
---
{{/* --- [ 2. Core Deployments (Web & Worker) ] --- */}}
{{- range $role := list "web" "worker" }}
{{- $cfg := index $.Values $role }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatwoot.full" $ }}-{{ $role }}
  labels:
    {{- include "chatwoot.labels" $ | nindent 4 }}
    role: {{ $role }}
spec:
  replicas: {{ include "chatwoot.app.replicas" (dict "context" $ "component" $role) }}
  selector:
    matchLabels:
      {{- include "chatwoot.selector" $ | nindent 6 }}
      role: {{ $role }}
  strategy: {type: RollingUpdate, rollingUpdate: {maxUnavailable: 0, maxSurge: 1}}
  template:
    metadata:
      labels:
        {{- include "chatwoot.selector" $ | nindent 8 }}
        role: {{ $role }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/app.yaml") $ | sha256sum }}
    spec:
      {{- include "chatwoot.pod.common" $ | nindent 6 }}
      containers:
        - name: {{ $role }}
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          {{- if eq $role "web" }}
          command: [docker/entrypoints/rails.sh]
          args: [bundle, exec, rails, s, -p, "{{ $.Values.services.internalPort }}", -b, 0.0.0.0]
          ports: [{containerPort: {{ $.Values.services.internalPort }} }]
          livenessProbe: {httpGet: {path: /health, port: {{ $.Values.services.internalPort }} }, initialDelaySeconds: 15}
          readinessProbe: {httpGet: {path: /api, port: {{ $.Values.services.internalPort }} }, initialDelaySeconds: 15}
          {{- else }}
          args: [bundle, exec, sidekiq, -C, config/sidekiq.yml]
          {{- end }}
          env: {{- include "chatwoot.env.common" $ | nindent 12 }}
          volumeMounts: [{name: cache, mountPath: /app/tmp}]
          {{- with $cfg.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
      securityContext: {runAsNonRoot: true, runAsUser: 1000}
---
{{- end }}
{{/* --- [ 3. Infrastructure: Service, SA, Ingress ] --- */}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatwoot.full" . }}
  labels: {{ include "chatwoot.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports: [{port: {{ .Values.service.port }}, targetPort: {{ .Values.services.targetPort }}, protocol: TCP}]
  selector:
    {{- include "chatwoot.selector" . | nindent 4 }}
    role: web
---
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "chatwoot.full" . }}
  labels: {{ include "chatwoot.labels" . | nindent 4 }}
---
{{- end }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "chatwoot.full" . }}
  labels: {{ include "chatwoot.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{ toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.tls }}
  tls: {{ toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend: {service: {name: {{ include "chatwoot.full" $ }}, port: {number: {{ $.Values.service.port }} }}}
          {{- end }}
    {{- end }}
{{- end }}
