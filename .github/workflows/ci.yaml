name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add helm dependencies
        run: |
          helm repo add bitnami "https://charts.bitnami.com/bitnami"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: |
          helm dep build charts/chatwoot
          ct lint --target-branch main

      - name: Install helm-unittest
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.7.1

      - name: Run unit tests
        run: helm unittest charts/chatwoot

  release:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add helm dependencies
        run: |
          helm repo add bitnami "https://charts.bitnami.com/bitnami"
          helm dep build charts/chatwoot/

      - name: Auto-increment Chart version
        run: |
          VERSION=$(yq eval '.version' charts/chatwoot/Chart.yaml)
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          
          yq eval ".version = \"$NEW_VERSION\"" -i charts/chatwoot/Chart.yaml
          yq eval ".description = (.description | sub(\"v[0-9.]+\", \"v$NEW_VERSION\"))" -i charts/chatwoot/Chart.yaml
          
          git add charts/chatwoot/Chart.yaml
          git commit -m "chore: auto-increment version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
