name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add helm dependencies
        run: |
          helm repo add bitnami "https://charts.bitnami.com/bitnami"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Run chart-testing (lint)
        run: |
          helm dep build charts/chatwoot
          ct lint --target-branch main

      - name: Install helm-unittest
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.7.1

      - name: Run unit tests
        run: helm unittest charts/chatwoot

  release:
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add helm dependencies
        run: |
          helm repo add bitnami "https://charts.bitnami.com/bitnami"
          helm dep build charts/chatwoot/

      - name: Sync Chart version metadata
        run: |
          VERSION=$(yq eval '.version' charts/chatwoot/Chart.yaml)
          LATEST_VERSION=$(git tag -l 'chatwoot-[0-9]*' | sed 's/^chatwoot-//' | sort -V | tail -n 1)
          TARGET_VERSION="$VERSION"

          if [ -n "$LATEST_VERSION" ]; then
            HIGHEST_VERSION=$(printf '%s\n%s\n' "$LATEST_VERSION" "$VERSION" | sort -V | tail -n 1)
            if [ "$VERSION" = "$LATEST_VERSION" ] || [ "$HIGHEST_VERSION" = "$LATEST_VERSION" ]; then
              MAJOR=$(echo "$LATEST_VERSION" | cut -d. -f1)
              MINOR=$(echo "$LATEST_VERSION" | cut -d. -f2)
              PATCH=$(echo "$LATEST_VERSION" | cut -d. -f3)
              TARGET_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            fi
          fi
          
          export TARGET_VERSION
          yq eval ".version = \"$TARGET_VERSION\"" -i charts/chatwoot/Chart.yaml
          yq eval ".description = (.description | sub(\"v[0-9.]+\", \"v$TARGET_VERSION\"))" -i charts/chatwoot/Chart.yaml
          perl -0pi -e 's/Chart v\d+\.\d+\.\d+/Chart v$ENV{TARGET_VERSION}/g' README.md
          perl -0pi -e 's/升级到 `\d+\.\d+\.\d+`/升级到 `$ENV{TARGET_VERSION}`/g' MAINTENANCE.md
          perl -0pi -e 's/\| \*\*v\d+\.\d+\.\d+\*\* \|/| **v$ENV{TARGET_VERSION}** |/' MAINTENANCE.md
          
          git add charts/chatwoot/Chart.yaml README.md MAINTENANCE.md
          git commit -m "chore: 同步版本到 $TARGET_VERSION [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
